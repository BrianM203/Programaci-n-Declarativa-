<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablas y Listas</title>
    <link rel="stylesheet" href="Tablas2.css">
</head>

<body>

<div class="contenido">

    <header>
        <h1>Tablas y Listas</h1>
    </header>

    <main>

        <section id="Tabla">
            <table>
                <tr>
                    <td>Columna 1</td>
                    <td>Columna 2</td>
                    <td>Columna 3</td>
                </tr>
                <tr>
                    <td>Dato 1</td>
                    <td>Dato 2</td>
                    <td>Dato 3</td>
                </tr>
            </table>
        </section>

        <section>
            <h2>Listas</h2>
            <ol>
                <li>Elemento 1</li>
                <li>Elemento 2</li>
                <li>Elemento 3</li>
            </ol>
        </section>

    </main>

    <footer>
        <p>Ejemplo de tablas y listas</p>
    </footer>

</div>

</body>
</html>

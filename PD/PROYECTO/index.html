<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tabla Periódica PRO</title>

  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:,">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h1>Tabla Periódica Interactiva PRO</h1>

<input type="text" id="buscador" placeholder="Buscar elemento...">

<div class="filtros">
  <button onclick="filtrar('todos')">Todos</button>
  <button onclick="filtrar('metal')">Metales</button>
  <button onclick="filtrar('no-metal')">No metales</button>
  <button onclick="filtrar('metalloid')">Metaloides</button>
  <button onclick="filtrar('gas')">Gases nobles</button>
</div>

<div id="tabla" class="tabla"></div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-contenido">
    <span id="cerrar">&times;</span>
    <h2 id="nombre"></h2>
    <p id="info"></p>
  </div>
</div>

<script src="main.js"></script>

</body>
</html>
